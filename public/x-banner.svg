<svg viewBox="0 0 1500 500" width="1500" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#0F0F0F"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#A0A0A0"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="blade2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#A0A0A0"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="blade3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#909090"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="blade4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#909090"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED"/><stop offset="60%" stop-color="#6D28D9"/><stop offset="100%" stop-color="#5B21B6"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1500" y2="100" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1500" y2="200" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1500" y2="300" stroke="white" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1500" y2="400" stroke="white" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="500" stroke="white" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="500" stroke="white" stroke-width="0.5"/>
  </g>

  <!-- Purple glow right side -->
  <circle cx="1250" cy="250" r="300" fill="url(#glowRight)"/>

  <!-- Left glow -->
  <ellipse cx="100" cy="250" rx="200" ry="250" fill="url(#glowRight)"/>

  <!-- Decorative dots -->
  <g opacity="0.08">
    <circle cx="100" cy="80" r="2" fill="#7C3AED"/>
    <circle cx="200" cy="120" r="1.5" fill="white"/>
    <circle cx="350" cy="60" r="1" fill="white"/>
    <circle cx="1300" cy="100" r="2" fill="#7C3AED"/>
    <circle cx="1400" cy="380" r="1.5" fill="white"/>
    <circle cx="1100" cy="420" r="1" fill="#7C3AED"/>
    <circle cx="800" cy="40" r="1.5" fill="white"/>
    <circle cx="500" cy="450" r="1" fill="white"/>
  </g>

  <!-- Logo -->
  <g transform="translate(100, 250)">
    <polygon points="0,-88 12,-12 0,0 -12,-12" fill="url(#blade1)"/>
    <polygon points="88,0 12,12 0,0 12,-12" fill="url(#blade2)"/>
    <polygon points="0,88 -12,12 0,0 12,12" fill="url(#blade3)"/>
    <polygon points="-88,0 -12,-12 0,0 -12,12" fill="url(#blade4)"/>
    <polygon points="0,-32 32,0 0,32 -32,0" fill="url(#centerGlow)" filter="url(#bigGlow)"/>
  </g>

  <!-- Vertical divider -->
  <line x1="230" y1="150" x2="230" y2="350" stroke="#7C3AED" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Text -->
  <text x="270" y="240" font-family="Inter, SF Pro, Helvetica Neue, Arial, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">ValtheraLabs</text>
  <text x="270" y="290" font-family="Inter, SF Pro, Helvetica Neue, Arial, sans-serif" font-size="18" font-weight="400" fill="#A0A0A0" letter-spacing="2">ENGINEERING INTELLIGENT DIGITAL SYSTEMS</text>

  <!-- Bottom accent line -->
  <rect x="270" y="305" width="60" height="2" rx="1" fill="#7C3AED" opacity="0.6"/>
</svg>
