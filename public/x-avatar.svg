<svg viewBox="0 0 400 400" width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#A0A0A0"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="blade2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#A0A0A0"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="blade3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#909090"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <linearGradient id="blade4" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8E8E8"/><stop offset="50%" stop-color="#909090"/><stop offset="100%" stop-color="#505050"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED"/><stop offset="60%" stop-color="#6D28D9"/><stop offset="100%" stop-color="#5B21B6"/>
    </radialGradient>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#7C3AED" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#7C3AED" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Logo blades scaled to 400x400 -->
  <g transform="translate(200,200) scale(1.8)">
    <polygon points="0,-88 12,-12 0,0 -12,-12" fill="url(#blade1)"/>
    <polygon points="88,0 12,12 0,0 12,-12" fill="url(#blade2)"/>
    <polygon points="0,88 -12,12 0,0 12,12" fill="url(#blade3)"/>
    <polygon points="-88,0 -12,-12 0,0 -12,12" fill="url(#blade4)"/>
    <polygon points="0,-32 32,0 0,32 -32,0" fill="url(#centerGlow)" filter="url(#bigGlow)"/>
  </g>

  <!-- Subtle inner glow overlay -->
  <circle cx="200" cy="200" r="140" fill="url(#centerGlow)" opacity="0.06"/>
</svg>
